{% extends 'base.html' %}
{% block content %}
<div class="container mt-5 mb-5" style="max-width: 600px;">
    <div class="card shadow-sm" style="border: 1px solid #000; border-radius: 0; background-color: #FFFBF7;">
        <div class="card-body p-5 text-center">
            <h2 class="fw-bold mb-4">📦 Bulk Product Update</h2>
            
            <p class="text-muted mb-4">Step 1: Apne saare products ki current list download karein aur Excel mein edit karein.</p>
            <a href="{% url 'export_products' %}" class="btn w-100 fw-bold mb-5" style="background: #000; color: #fff; border-radius: 0; padding: 12px;">
                📥 DOWNLOAD PRODUCTS (CSV)
            </a>
            
            <hr style="border-top: 2px dashed #ccc;">
            
            <p class="text-muted mt-4 mb-3">Step 2: Edit ki gayi .csv file ko yahan upload karein.</p>
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="mb-4 text-start">
                    <input type="file" name="csv_file" class="form-control form-control-lg" accept=".csv" required style="border: 1px solid #000; border-radius: 0;">
                </div>
                <button type="submit" class="btn w-100 fw-bold" style="background: #0d9488; color: #fff; border-radius: 0; padding: 12px;">
                    🚀 UPLOAD & UPDATE PRODUCTS
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
