{% extends 'base.html' %}
{% block content %}
<div class="container mt-5 mb-5" style="max-width: 400px;">
    <div class="card p-4 border-dark rounded-0 shadow">
        <h3 class="text-center fw-bold mb-4">Enter OTP</h3>
        <p class="text-muted text-center">OTP aapke email par bhej diya gaya hai.</p>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <input type="text" name="otp" class="form-control form-control-lg rounded-0 border-dark text-center fw-bold" required placeholder="Enter 6-digit Code" maxlength="6">
            </div>
            <button type="submit" class="btn btn-dark w-100 rounded-0 fw-bold">Verify & Login</button>
        </form>
    </div>
</div>
{% endblock %}
