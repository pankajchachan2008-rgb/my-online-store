{% extends 'base.html' %}
{% load static %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
    body { font-family: 'Jost', sans-serif; background-color: #FAF4EF; }
    
    .auth-card {
        background: #FFFFFF;
        border: 1px solid #000000;
        box-shadow: 6px 6px 0px #000000;
        padding: 40px;
        max-width: 500px;
        margin: 60px auto;
        border-radius: 0;
    }

    .auth-title {
        font-weight: 700;
        font-size: 2rem;
        text-transform: uppercase;
        margin-bottom: 25px;
        text-align: center;
        letter-spacing: 1px;
    }

    /* Django Form Styling Override */
    .auth-card form p { margin-bottom: 15px; text-align: left; }
    .auth-card form label { font-weight: 600; margin-bottom: 5px; display: block; }
    .auth-card form input {
        width: 100%;
        border: 1px solid #000000;
        border-radius: 0;
        padding: 10px 15px;
        outline: none;
        font-family: inherit;
    }
    .auth-card form input:focus { border-width: 2px; }
    .auth-card .helptext { font-size: 0.75rem; color: #666; margin-top: 4px; display: block; }
    .auth-card ul.errorlist { color: red; font-size: 0.8rem; list-style: none; padding-left: 0; }

    .btn-auth {
        background: #000000;
        color: #FFFFFF;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        border-radius: 0;
        border: none;
        padding: 12px;
        transition: 0.3s ease;
        width: 100%;
        margin-top: 15px;
    }
    .btn-auth:hover { background: #333333; color: white; }
    
    .auth-link { color: #000; font-weight: 600; text-decoration: underline; }
    .auth-link:hover { color: #555; }
</style>

<div class="container">
    <div class="auth-card">
        <h3 class="auth-title">Create Account</h3>
        
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-auth">Register</button>
        </form>
        
        <div class="mt-4 text-center">
            <p class="mb-1 text-muted">Pehle se account hai?</p>
            <a href="{% url 'login' %}" class="auth-link">Login karein</a>
        </div>
    </div>
</div>
{% endblock %}
